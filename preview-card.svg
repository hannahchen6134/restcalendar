<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">養肌肉，變漂亮 分享預覽圖</title>
  <desc id="desc">奶油金色的優雅重訓紀錄月曆分享預覽圖。</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="86%">
      <stop offset="0%" stop-color="#fff7df"/>
      <stop offset="56%" stop-color="#f3e7d6"/>
      <stop offset="100%" stop-color="#e6d8c6"/>
    </radialGradient>
    <radialGradient id="light" cx="50%" cy="32%" r="52%">
      <stop offset="0%" stop-color="#fffdf8" stop-opacity="0.96"/>
      <stop offset="74%" stop-color="#fffdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#f8efe1"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" x2="1">
      <stop offset="0%" stop-color="#2c1a0e"/>
      <stop offset="100%" stop-color="#6f4b2b"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-24%" width="136%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#4a2e18" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#light)"/>
  <g opacity="0.18">
    <path d="M120 132H1080M120 498H1080" stroke="#b8924a"/>
    <path d="M190 90V540M1010 90V540" stroke="#b8924a"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="146" y="92" width="892" height="444" rx="46" fill="url(#paper)" stroke="#d9bd7a" stroke-opacity="0.46"/>
    <rect x="178" y="124" width="828" height="380" rx="32" fill="none" stroke="#b8924a" stroke-opacity="0.16"/>
  </g>
  <text x="600" y="186" text-anchor="middle" fill="#b8924a" fill-opacity="0.58" font-family="'Segoe Script','Brush Script MT','Apple Chancery',cursive" font-size="29" letter-spacing="12">gentle strength calendar</text>
  <text x="600" y="294" text-anchor="middle" fill="url(#ink)" font-family="'Noto Serif TC','PMingLiU',serif" font-size="78" font-weight="600" letter-spacing="8">養肌肉，變漂亮</text>
  <text x="600" y="362" text-anchor="middle" fill="#7a6040" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-size="28" font-weight="300" letter-spacing="1.5">每天一點點，身體會記得。</text>
  <g transform="translate(468 418)">
    <rect width="264" height="52" rx="26" fill="#fffaf0" stroke="#d9bd7a" stroke-opacity="0.42"/>
    <circle cx="58" cy="26" r="15" fill="#f8efe1" stroke="#d4af70" stroke-opacity="0.56"/>
    <circle cx="132" cy="26" r="15" fill="#edf3e6" stroke="#7f9b72" stroke-opacity="0.48"/>
    <circle cx="206" cy="26" r="15" fill="#f8efe1" stroke="#d4af70" stroke-opacity="0.56"/>
  </g>
</svg>
