<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">2026養肌肉變漂亮月曆預覽圖</title>
  <desc id="desc">奶油金色背景上的 2026 養肌肉變漂亮月曆分享預覽圖。</desc>
  <defs>
    <radialGradient id="warmGlow" cx="50%" cy="18%" r="74%">
      <stop offset="0%" stop-color="#fff7d9" stop-opacity="0.9"/>
      <stop offset="48%" stop-color="#f8efe1" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#efe4d2" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="blushGlow" cx="12%" cy="15%" r="42%">
      <stop offset="0%" stop-color="#d9ad95" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d9ad95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffcf6" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#f7efe2" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0%" stop-color="#d9b86f"/>
      <stop offset="100%" stop-color="#9b6d40"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#4a2e18" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#warmGlow)"/>
  <rect width="1200" height="630" fill="url(#blushGlow)"/>
  <g opacity="0.28">
    <path d="M0 108H1200M0 216H1200M0 324H1200M0 432H1200M0 540H1200" stroke="#b8924a" stroke-width="1"/>
    <path d="M108 0V630M216 0V630M324 0V630M432 0V630M540 0V630M648 0V630M756 0V630M864 0V630M972 0V630M1080 0V630" stroke="#b8924a" stroke-width="1"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="92" y="76" width="1016" height="478" rx="42" fill="url(#card)" stroke="#e6c989" stroke-opacity="0.54"/>
    <rect x="124" y="108" width="952" height="414" rx="30" fill="none" stroke="#b8924a" stroke-opacity="0.2"/>
  </g>
  <g transform="translate(164 150)">
    <text x="0" y="0" fill="#b8924a" fill-opacity="0.62" font-family="'Segoe Script','Brush Script MT','Apple Chancery',cursive" font-size="28" letter-spacing="11">gentle strength calendar</text>
    <text x="0" y="118" fill="#2c1a0e" font-family="'Noto Serif TC','PMingLiU',serif" font-size="72" font-weight="600" letter-spacing="5">2026養肌肉</text>
    <text x="0" y="214" fill="#2c1a0e" font-family="'Noto Serif TC','PMingLiU',serif" font-size="72" font-weight="600" letter-spacing="5">變漂亮月曆</text>
    <text x="4" y="292" fill="#7a6040" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif" font-size="28" font-weight="300" letter-spacing="1">每天 100 下，溫柔記錄每一次重訓。</text>
  </g>
  <g transform="translate(828 178)">
    <rect x="0" y="0" width="174" height="214" rx="28" fill="#fffcf6" stroke="#e2c47f"/>
    <circle cx="87" cy="70" r="34" fill="#fff8e8" stroke="#d9b86f" stroke-opacity="0.52"/>
    <text x="87" y="82" text-anchor="middle" fill="#4a2e18" font-family="Georgia,serif" font-size="42">1</text>
    <text x="87" y="150" text-anchor="middle" fill="#4a2e18" font-family="Georgia,serif" font-size="54">100</text>
    <path d="M38 178H136" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" opacity="0.42"/>
  </g>
