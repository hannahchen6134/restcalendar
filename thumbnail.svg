  <text x="256" y="182" text-anchor="middle" fill="#b8924a" fill-opacity="0.6" font-family="'Segoe Script','Brush Script MT','Apple Chancery',cursive" font-size="26" letter-spacing="8">gentle</text>
  <text x="256" y="266" text-anchor="middle" fill="#2c1a0e" font-family="'Noto Serif TC','PMingLiU',serif" font-size="54" font-weight="600" letter-spacing="4">變漂亮</text>
  <path d="M186 320H326" stroke="#d4af70" stroke-width="9" stroke-linecap="round" opacity="0.42"/>
  <circle cx="256" cy="354" r="18" fill="#edf3e6" stroke="#7f9b72" stroke-opacity="0.42" stroke-width="2"/>
